<!doctype html>
<html lang="en">
  <body
    style="margin: 0; padding: 24px; background-color: #f4f4f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #18181b;"
  >
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 480px; margin: 0 auto;">
      <tr>
        <td style="background-color: #ffffff; border: 1px solid #e4e4e7; padding: 32px;">
          <h1 style="margin: 0 0 16px; font-size: 22px; font-weight: 600;">Confirm your Snapchef account</h1>
          <p style="margin: 0 0 24px; font-size: 15px; line-height: 1.5; color: #3f3f46;">
            Welcome to Snapchef! Click the button below to confirm your email address and activate your account.
          </p>
          <p style="margin: 0 0 24px;">
            <!-- Must use {{ .TokenHash }} (NOT {{ .ConfirmationURL }}) so the token_hash flow drives the app's own
                 /auth/confirm route. The &type=email value MUST match the EmailOtpType passed to verifyOtp. -->
            <a
              href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email"
              style="display: inline-block; background-color: #18181b; color: #ffffff; text-decoration: none; padding: 12px 20px; font-size: 15px; font-weight: 500;"
            >
              Confirm your account
            </a>
          </p>
          <p style="margin: 0; font-size: 13px; line-height: 1.5; color: #71717a;">
            If the button doesn't work, copy and paste this link into your browser:<br />
            {{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
