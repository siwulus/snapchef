name: Code Review

# AI code-review merge gate for PRs to main. Separate from ci.yml (lint + build):
# this runs the packages/code-review reviewer, posts inline + sticky findings, and
# reports a required `code-review/gate` commit status. Cost-controlled — it runs once
# on open/reopen and thereafter only when the `cr:revalidate` label is added.
on:
  pull_request:
    types: [opened, reopened, labeled]
    branches: [main]

# One run per PR; a newer run cancels an in-flight one. Safe: the gate is fail-closed
# and evaluated per head SHA, so a cancelled mid-run never yields a false green.
concurrency:
  group: code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Least privilege: read code, write the gate status, post reviews + sticky comment, manage labels.
permissions:
  contents: read
  statuses: write
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Decide whether to actually review. No checkout needed yet. Forks get no run
      # (secrets are withheld from fork PRs); only open/reopen or a cr:revalidate label trigger.
      - name: Gate decision
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const headRepo = pr.head.repo && pr.head.repo.full_name;
            const isFork = headRepo !== context.payload.repository.full_name;
            const action = context.payload.action;
            const isOpenReopen = action === 'opened' || action === 'reopened';
            const isRevalidate = action === 'labeled' && context.payload.label && context.payload.label.name === 'cr:revalidate';
            const run = !isFork && (isOpenReopen || isRevalidate);
            core.info(`gate: action=${action} fork=${isFork} -> run=${run}`);
            core.setOutput('run', run ? 'true' : 'false');

      - name: Checkout PR head
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup toolchain (mise → node + pnpm)
        if: steps.gate.outputs.run == 'true'
        uses: jdx/mise-action@v4

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Compute PR diff (three-dot / merge-base)
        id: diff
        if: steps.gate.outputs.run == 'true'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          git diff "origin/${BASE_REF}...HEAD" > "${GITHUB_WORKSPACE}/pr.diff"
          if [ -s "${GITHUB_WORKSPACE}/pr.diff" ]; then
            echo "empty=false" >> "$GITHUB_OUTPUT"
          else
            echo "empty=true" >> "$GITHUB_OUTPUT"
          fi
          echo "diff size: $(wc -c < "${GITHUB_WORKSPACE}/pr.diff") bytes"

      # Run the reviewer, capturing the exit code instead of aborting the job: a non-zero
      # code (with a non-empty diff) is the infra-failure path the gate fails closed on.
      - name: Run code reviewer
        id: review
        if: steps.gate.outputs.run == 'true' && steps.diff.outputs.empty == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          pnpm --filter code-review exec tsx src/cli.ts --json --model claude-sonnet-4-6 \
            < "${GITHUB_WORKSPACE}/pr.diff" \
            > "${GITHUB_WORKSPACE}/review.json" \
            2> "${GITHUB_WORKSPACE}/review.err"
          echo "code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Build post plan
        if: steps.gate.outputs.run == 'true' && steps.diff.outputs.empty == 'false' && steps.review.outputs.code == '0'
        run: |
          pnpm --filter @snapchef/code-review-ci exec tsx src/index.ts \
            "${GITHUB_WORKSPACE}/pr.diff" \
            "${GITHUB_WORKSPACE}/review.json" \
            "${GITHUB_WORKSPACE}/cr-output.json"

      # All GitHub I/O in one step. Runs on every path (always()) so the gate status is
      # posted even on the empty / infra-failure branches. Reads cr-output.json on the
      # success path; branches on DIFF_EMPTY / PKG_CODE otherwise.
      - name: Apply review to PR
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/github-script@v7
        env:
          PKG_CODE: ${{ steps.review.outputs.code }}
          DIFF_EMPTY: ${{ steps.diff.outputs.empty }}
        with:
          script: |
            const fs = require('fs');
            const ws = process.env.GITHUB_WORKSPACE || '.';
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const headSha = pr.head.sha;
            const { owner, repo } = context.repo;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${context.runId}`;

            const STICKY_MARKER = '<!-- code-review-bot -->';
            const INLINE_MARKER = '<!-- crb-inline -->';
            const BOT = 'github-actions[bot]';

            const pkgCode = process.env.PKG_CODE || '';
            const isEmpty = process.env.DIFF_EMPTY === 'true';
            const errMsg = (e) => (e instanceof Error ? e.message : String(e));

            const ensureLabel = async (name, color, description) => {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, name, color, description });
                } else {
                  throw e;
                }
              }
            };

            const removeLabelSafe = async (name) => {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name });
              } catch (e) {
                if (e.status !== 404) throw e;
              }
            };

            const upsertSticky = async (body) => {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number: prNumber, per_page: 100,
              });
              const existing = comments.find((c) => c.user && c.user.login === BOT && c.body && c.body.includes(STICKY_MARKER));
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
              }
            };

            const setStatus = async (state, description) => {
              await github.rest.repos.createCommitStatus({
                owner, repo, sha: headSha, context: 'code-review/gate', state, target_url: runUrl, description,
              });
            };

            let finalState = 'failure';
            let finalDescription = 'Code review blocked';

            try {
              await ensureLabel('cr:pass', '0e8a16', 'AI code-review gate passed');
              await ensureLabel('cr:fail', 'd93f0b', 'AI code-review gate failed');
              await ensureLabel('cr:revalidate', 'fbca04', 'Re-run the AI code review on the current commit');

              // Run-start label lifecycle: consume cr:revalidate, clear stale verdict labels.
              for (const name of ['cr:revalidate', 'cr:pass', 'cr:fail']) {
                await removeLabelSafe(name);
              }

              if (isEmpty) {
                finalState = 'success';
                finalDescription = 'No reviewable changes';
                await upsertSticky(`${STICKY_MARKER}\n## Code review summary\n\n**Verdict:** \`approve\`\n\n_No reviewable changes in this PR._`);
                await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['cr:pass'] });
              } else if (pkgCode !== '0') {
                finalState = 'failure';
                finalDescription = 'Review did not run (infra error)';
                let errTail = '(no error output captured)';
                try {
                  const raw = fs.readFileSync(`${ws}/review.err`, 'utf8').trim();
                  if (raw.length > 0) errTail = raw.split('\n').slice(-15).join('\n');
                } catch (e) {
                  core.info(`no review.err: ${errMsg(e)}`);
                }
                const body = [
                  STICKY_MARKER,
                  '## Code review — infrastructure error',
                  '',
                  `The automated review did not complete (exit code \`${pkgCode || 'n/a'}\`). This is **not** a code verdict — the merge gate is **blocked** until a clean run.`,
                  '',
                  'Re-run it by adding the `cr:revalidate` label once the cause is resolved.',
                  '',
                  '<details><summary>Error output</summary>',
                  '',
                  '```',
                  errTail,
                  '```',
                  '',
                  '</details>',
                ].join('\n');
                await upsertSticky(body);
                // No verdict label on the infra path.
              } else {
                const plan = JSON.parse(fs.readFileSync(`${ws}/cr-output.json`, 'utf8'));
                finalState = plan.state;
                finalDescription = plan.state === 'success' ? 'Code review passed' : 'Code review requested changes';

                // Remove prior bot inline comments so a re-run does not duplicate.
                const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
                  owner, repo, pull_number: prNumber, per_page: 100,
                });
                for (const c of reviewComments) {
                  if (c.user && c.user.login === BOT && c.body && c.body.includes(INLINE_MARKER)) {
                    await github.rest.pulls.deleteReviewComment({ owner, repo, comment_id: c.id });
                  }
                }

                // Sticky first so the summary survives even if the inline review 422s.
                await upsertSticky(plan.stickyBody);

                await github.rest.pulls.createReview({
                  owner, repo, pull_number: prNumber, commit_id: headSha, event: 'COMMENT',
                  body: plan.reviewBody,
                  comments: plan.comments.map((c) => ({ path: c.path, line: c.line, side: c.side, body: c.body })),
                });

                await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: [plan.label] });
              }
            } catch (e) {
              // Fail-closed: any I/O error blocks the gate.
              core.error(`code-review apply failed: ${errMsg(e)}`);
              finalState = 'failure';
              finalDescription = 'Code review I/O error';
              try {
                await upsertSticky(`${STICKY_MARKER}\n## Code review — error\n\nThe review step failed while posting results: \`${errMsg(e)}\`\n\nAdd \`cr:revalidate\` to retry.`);
              } catch (inner) {
                core.warning(`could not upsert error sticky: ${errMsg(inner)}`);
              }
            } finally {
              await setStatus(finalState, finalDescription);
            }
