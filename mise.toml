# mise.toml — environment management for snapchef
# Docs: https://mise.jdx.dev/configuration.html

[tools]
node = "24"
# npm: backend (not the default aqua) — aqua ships no darwin/amd64 pnpm build, which
# would break Intel-Mac dev while still passing on Linux CI / Apple Silicon.
"npm:pnpm" = "11.6.0"

[env]
NODE_ENV = "development"
_.file = ".env"

[tasks.dev]
description = "Run Astro dev server"
run = "pnpm dev"

[tasks.build]
description = "Build for Cloudflare Workers"
run = "pnpm build"

[tasks.preview]
description = "Preview built site"
run = "pnpm preview"

[tasks.lint]
description = "ESLint (type-checked)"
run = "pnpm lint"

[tasks.format]
description = "Prettier write"
run = "pnpm format"

[tasks.tail]
description = "Tail live Cloudflare Worker logs (read-only)"
run = "pnpm exec wrangler tail"

[tasks.db-start]
description = "Start local Supabase stack (requires Docker)"
run = "pnpm exec supabase start"

[tasks.db-stop]
description = "Stop local Supabase stack"
run = "pnpm exec supabase stop"

[tasks.worktree-setup]
description = "Make a fresh git worktree runnable: link .env, trust mise, install deps, sync types"
run = """
main_root=$(cd "$(git rev-parse --git-common-dir)/.." && pwd)
[ -e .env ] || ln -s "$main_root/.env" .env
mise trust
pnpm install --frozen-lockfile
pnpm astro sync
"""
